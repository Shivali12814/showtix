<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="340" height="80">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#2d0d0d"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff2020"/>
      <stop offset="100%" stop-color="#8b0000"/>
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect x="0" y="0" width="340" height="80" rx="12" fill="url(#bg)"/>
  <rect x="0" y="0" width="340" height="80" rx="12" fill="none" stroke="#e50914" stroke-width="1.5" opacity="0.6"/>

  <!-- Left red accent bar -->
  <rect x="0" y="0" width="6" height="80" rx="3" fill="url(#red)"/>

  <!-- Film ticket icon -->
  <g transform="translate(18, 20)">
    <rect x="0" y="0" width="36" height="22" rx="5" fill="#e50914"/>
    <circle cx="0" cy="11" r="5" fill="#1a0a0a"/>
    <circle cx="36" cy="11" r="5" fill="#1a0a0a"/>
    <line x1="11" y1="1" x2="11" y2="21" stroke="#1a0a0a" stroke-width="1.5" stroke-dasharray="3,2"/>
    <rect x="14" y="7" width="16" height="8" rx="2" fill="white" opacity="0.95"/>
  </g>

  <!-- SHOWTIX text -->
  <text x="68" y="30"
        font-family="'Bebas Neue', Impact, Arial Narrow, sans-serif"
        font-size="26" font-weight="400"
        fill="white" letter-spacing="3">SHOWTIX</text>

  <!-- PREMIERES label -->
  <text x="68" y="52"
        font-family="'Bebas Neue', Impact, Arial Narrow, sans-serif"
        font-size="22" font-weight="400"
        fill="#e50914" letter-spacing="5">PREMIERES</text>

  <!-- Tagline -->
  <text x="68" y="68"
        font-family="Arial, sans-serif"
        font-size="10" font-weight="400"
        fill="#888" letter-spacing="1">NEW RELEASES EVERY FRIDAY</text>

  <!-- Right star decoration -->
  <polygon points="316,16 319,24 327,24 321,29 323,37 316,32 309,37 311,29 305,24 313,24"
           fill="#e50914" opacity="0.9"/>

  <!-- Right film holes -->
  <rect x="334" y="10" width="4" height="10" rx="2" fill="#333"/>
  <rect x="334" y="34" width="4" height="10" rx="2" fill="#333"/>
  <rect x="334" y="58" width="4" height="10" rx="2" fill="#333"/>
</svg>
